name: content-radar

# PAUSED: disabled in GitHub Actions with no automatic schedule. Manual dispatch
# is retained only as a recovery path for an intentional future restart.

# Retained implementation for collecting signal and drafting posts with Claude.
# It runs only if the disabled workflow is intentionally restored and manually
# dispatched; there is deliberately no schedule while the project is paused.
#
# One-time setup:
#   1. Locally:  claude setup-token   -> copies a 1-year subscription token
#   2. Repo → Settings → Secrets and variables → Actions → add:
#        CLAUDE_CODE_OAUTH_TOKEN  (required)
#        TWITTERAPI_IO_KEY, REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET (optional)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Verify Claude auth (fails loudly if the token is bad)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --version
          echo 'Reply with exactly: OK' | claude -p --output-format json --model sonnet

      - name: Collect signal
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m content_radar.cli collect

      - name: Enrich corpus with full article text (detailed KB)
        run: python -m content_radar.cli enrich --top 50

      - name: Cache fastembed model
        uses: actions/cache@v5
        with:
          path: ~/.cache/fastembed
          key: fastembed-e5-large-jina-v2

      - name: Index into the Qdrant knowledge base
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python -m content_radar.cli index || echo "Qdrant not configured — skipping"

      - name: Build thematic digest (Claude on subscription)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # --enrich: fetch article text for top links; --best-of: pick best of N
        run: python -m content_radar.cli digest --out digests --themes 5 --enrich 12 --best-of 2

      # NOTE: AINews forwarding moved to ainews-watch.yml, which checks once
      # daily at 18:00 Taipei after the usual newsletter arrival window.

      - name: Synthesize post drafts (Claude on subscription)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python -m content_radar.cli synthesize --out drafts --n 5

      - name: Commit digest + drafts for review
        run: |
          git config user.name "content-radar[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add -f digests/ drafts/
          git commit -m "radar: digest + drafts for $(date -u +%F)" || { echo "nothing new"; exit 0; }
          git push
