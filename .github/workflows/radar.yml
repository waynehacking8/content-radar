name: content-radar

# Runs on GitHub's servers (your laptop can be off). Collects signal, drafts
# posts with Claude on YOUR subscription (no API key), and commits the drafts
# to drafts/ for you to review from anywhere — including your phone.
#
# One-time setup:
#   1. Locally:  claude setup-token   -> copies a 1-year subscription token
#   2. Repo → Settings → Secrets and variables → Actions → add:
#        CLAUDE_CODE_OAUTH_TOKEN  (required)
#        TWITTERAPI_IO_KEY, REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET (optional)

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC daily (08:00 Taipei)
  workflow_dispatch: {}    # also runnable on-demand from the Actions tab

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Collect signal
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python -m content_radar.cli collect

      - name: Synthesize drafts (Claude on subscription)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python -m content_radar.cli synthesize --out drafts --n 5

      - name: Commit drafts for review
        run: |
          git config user.name "content-radar[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add -f drafts/
          git commit -m "radar: drafts for $(date -u +%F)" || { echo "no new drafts"; exit 0; }
          git push
