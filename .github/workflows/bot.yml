name: radar-bot

# Near-instant Telegram bot with NO server. A long-polling job answers messages
# in real time; GitHub restarts it every 6h (jobs cap at 6h). Public-repo Actions
# minutes are free/unlimited. A new run cancels the old one for a clean handoff.
# Answers run on your Claude subscription, grounded in the day's collected signal.

on:
  schedule:
    - cron: "0 */6 * * *"     # restart every 6 hours
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: radar-bot
  cancel-in-progress: true     # newest run wins; avoids double getUpdates (409)

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small

      - name: Run bot (continuous long-poll, ~5h40m then auto-restart)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: timeout 20400 python -m content_radar.telegram_bot || true
