name: radar-bot

# PAUSED: disabled in GitHub Actions with no automatic schedule. Manual dispatch
# is retained only as a recovery path for an intentional future restart.

# Retained implementation of the serverless Telegram bot. If intentionally
# restored and manually dispatched, it long-polls for up to ~5h40m; there is no
# automatic restart while the project is paused.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: radar-bot
  cancel-in-progress: true     # newest run wins; avoids double getUpdates (409)

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Cache fastembed model
        uses: actions/cache@v5
        with:
          path: ~/.cache/fastembed
          key: fastembed-e5-large-jina-v2

      - name: Run bot (continuous long-poll, ~5h40m then auto-restart)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: timeout 20400 python -m content_radar.telegram_bot || true
